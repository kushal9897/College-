{% extends "base.html" %}
{% block title %}Payment Failed - TechMate{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center">
                <div class="error-icon mb-4">
                    <i class="bi bi-x-circle"></i>
                </div>
                <h2 class="text-danger mb-3">Payment Failed</h2>
                <p class="lead mb-4">{{ reason }}</p>
                <div class="alert alert-danger">
                    <strong>Transaction Reference:</strong> {{ transaction_ref }}<br>
                    <strong>Amount:</strong> ₹{{ amount }}
                </div>
                <div class="mt-4">
                    <a href="{% url 'student_fees' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-arrow-counterclockwise"></i> Try Again
                    </a>
                    <a href="{% url 'student_fees' %}" class="btn btn-outline-secondary btn-lg">Back to Fees</a>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.error-icon {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
}
.error-icon i {
    font-size: 3.5rem;
    color: white;
}
</style>
{% endblock %}
